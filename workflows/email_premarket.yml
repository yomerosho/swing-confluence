name: Swing — Pre-Market Validation (8 AM CT)

# Target: 08:00 America/Chicago
#   CDT (UTC-5): 13:00 UTC
#   CST (UTC-6): 14:00 UTC
# Guard window: 07:45–08:45 Chicago

on:
  schedule:
    - cron: '0 13 * * 1-5'   # CDT
    - cron: '0 14 * * 1-5'   # CST
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Force send (bypass timing guard)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  send-premarket:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.ALPACA_KEY }}" ]         && MISSING="$MISSING ALPACA_KEY"
          [ -z "${{ secrets.ALPACA_SECRET }}" ]      && MISSING="$MISSING ALPACA_SECRET"
          [ -z "${{ secrets.GMAIL_USER }}" ]         && MISSING="$MISSING GMAIL_USER"
          [ -z "${{ secrets.GMAIL_APP_PASSWORD }}" ] && MISSING="$MISSING GMAIL_APP_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "❌ Missing secrets:$MISSING"
            exit 1
          fi
          echo "✅ All secrets configured"

      - name: DST guard (07:45–08:45 Chicago)
        id: dst_check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_send }}" = "true" ]; then
            echo "⚡ Force send"
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          HOUR=$(TZ='America/Chicago' date +%H)
          MIN=$(TZ='America/Chicago' date +%M)
          NOW_MIN=$((10#$HOUR * 60 + 10#$MIN))
          START=$((7*60 + 45))   # 07:45
          END=$((8*60 + 45))     # 08:45
          NOW_STR=$(TZ='America/Chicago' date +'%H:%M %Z %A')
          echo "🕐 Chicago: $NOW_STR (NOW=${NOW_MIN}min)"
          echo "🎯 Window: 07:45–08:45"
          if [ "$NOW_MIN" -ge "$START" ] && [ "$NOW_MIN" -le "$END" ]; then
            echo "✅ In window"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️  Outside window (wrong DST cron half), skipping"
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-python@v5
        if: steps.dst_check.outputs.should_run == 'true'
        with:
          python-version: '3.11'
          cache: pip

      - name: Install deps
        if: steps.dst_check.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run premarket scan & email
        if: steps.dst_check.outputs.should_run == 'true'
        env:
          ALPACA_KEY:         ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET:      ${{ secrets.ALPACA_SECRET }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python run_scheduled_email.py --slot premarket --skip-if-empty
